name: Release

# build.zig.zon の .version 変更を trigger に release を自動生成 (Zig native の慣習):
#   1. check-version: zon から version 抽出 + 既存 release/tag の semver 最大値より
#      厳密に大きいか確認 (= downgrade / 重複 / 取りこぼし 防止)。bump-semver を
#      使い「new > latest-release」AND「new > latest-tag (tag があれば)」を gate。
#   2. build: cross-compile matrix で各 target binary を作成
#   3. release: gh release create でタグ + Release 作成 + binary 添付
#   4. update-homebrew: kawaz/homebrew-tap に formula を自動更新
#
# tag は workflow 自身が打つ (gh release create が自動で作る)。人 / AI は
# tag を扱わない (= kawaz 標準: release-flow-awareness rule)。
#
# Note: Zig project の version は build.zig.zon が正本 (= 別 VERSION ファイル
# を作らない)。bump-semver は zon を text+regex で扱える (= basename 検出)。

on:
  push:
    branches: [main]
    paths:
      - "build.zig.zon"

permissions:
  contents: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.current }}
      changed: ${{ steps.version.outputs.changed }}
    steps:
      - uses: actions/checkout@v4

      - name: Install bump-semver
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # Linux runner なので linux-amd64 を直接 release から取る (= brew より軽い)
          gh release download --repo kawaz/bump-semver --pattern bump-semver-linux-amd64 -O /usr/local/bin/bump-semver
          chmod +x /usr/local/bin/bump-semver
          bump-semver --version

      - name: Check version change
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          # build.zig.zon の .version = "X.Y.Z" を抽出
          CURRENT=$(bump-semver get build.zig.zon)
          echo "current=${CURRENT}" >> "$GITHUB_OUTPUT"

          # 0.0.0 プレースホルダ (= 初期未リリース状態) はスキップ
          if [ -z "$CURRENT" ] || [ "$CURRENT" = "0.0.0" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Placeholder version (${CURRENT:-empty}); skipping release."
            exit 0
          fi

          # 既存 release / tag の semver 最大値より厳密に大きいか確認。
          # latest-release: GH Release の semver 最大 (= "Latest" 印は時系列
          # なので semver 最大とは限らない、bump-semver は semver で判定する)。
          # latest-tag: git tag (origin) の semver 最大、tag 不在なら exit 3。
          # 両方 (取得できる範囲で) 上回ることを要求 = downgrade / 抜け道なし。
          FAIL=0

          if LATEST_REL=$(bump-semver vcs get latest-release --repository "$REPO" 2>/dev/null); then
            echo "latest-release: ${LATEST_REL}"
            if ! bump-semver compare gt "$CURRENT" "$LATEST_REL"; then
              echo "::error::v${CURRENT} is not greater than latest GH release v${LATEST_REL}"
              FAIL=1
            fi
          else
            echo "latest-release: (none yet)"
          fi

          if LATEST_TAG=$(bump-semver vcs get latest-tag 2>/dev/null); then
            echo "latest-tag: ${LATEST_TAG}"
            if ! bump-semver compare gt "$CURRENT" "$LATEST_TAG"; then
              echo "::error::v${CURRENT} is not greater than latest git tag v${LATEST_TAG}"
              FAIL=1
            fi
          else
            echo "latest-tag: (none yet)"
          fi

          if [ "$FAIL" = "1" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "New version detected: v${CURRENT} (passes both gates)"

  build:
    needs: check-version
    if: needs.check-version.outputs.changed == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-macos
            asset: die-darwin-arm64
          - target: x86_64-macos
            asset: die-darwin-amd64
          - target: x86_64-linux-gnu
            asset: die-linux-amd64
          - target: aarch64-linux-gnu
            asset: die-linux-arm64
          - target: x86_64-linux-musl
            asset: die-linux-amd64-musl
          - target: aarch64-linux-musl
            asset: die-linux-arm64-musl
          - target: x86_64-windows-gnu
            asset: die-windows-amd64.exe
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - name: Cross-compile (${{ matrix.target }})
        env:
          TARGET: ${{ matrix.target }}
          ASSET: ${{ matrix.asset }}
        run: |
          set -euo pipefail
          zig build "-Dtarget=${TARGET}" -Doptimize=ReleaseSmall
          # zig produces zig-out/bin/die (or die.exe for windows targets)
          if [ -f zig-out/bin/die.exe ]; then
            cp zig-out/bin/die.exe "${ASSET}"
          else
            cp zig-out/bin/die "${ASSET}"
          fi
          ls -lh "${ASSET}"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}
          if-no-files-found: error
          retention-days: 1

  release:
    needs: [check-version, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: Create release with tag
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.check-version.outputs.version }}
          COMMIT_SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          ls -lh
          gh release create "v${VERSION}" \
            --repo "$REPO" \
            --title "v${VERSION}" \
            --target "$COMMIT_SHA" \
            --generate-notes \
            die-*

  update-homebrew:
    needs: [check-version, release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Calculate checksums
        id: checksums
        run: |
          set -euo pipefail
          {
            echo "darwin_arm64=$(sha256sum artifacts/die-darwin-arm64/die-darwin-arm64 | cut -d' ' -f1)"
            echo "darwin_amd64=$(sha256sum artifacts/die-darwin-amd64/die-darwin-amd64 | cut -d' ' -f1)"
            echo "linux_amd64=$(sha256sum artifacts/die-linux-amd64/die-linux-amd64 | cut -d' ' -f1)"
            echo "linux_arm64=$(sha256sum artifacts/die-linux-arm64/die-linux-arm64 | cut -d' ' -f1)"
          } >> "$GITHUB_OUTPUT"
      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: kawaz/homebrew-tap
          ssh-key: ${{ secrets.HOMEBREW_TAP_DEPLOY_KEY }}
          path: homebrew-tap
      - name: Update formula
        env:
          VERSION: ${{ needs.check-version.outputs.version }}
          DARWIN_ARM64: ${{ steps.checksums.outputs.darwin_arm64 }}
          DARWIN_AMD64: ${{ steps.checksums.outputs.darwin_amd64 }}
          LINUX_AMD64: ${{ steps.checksums.outputs.linux_amd64 }}
          LINUX_ARM64: ${{ steps.checksums.outputs.linux_arm64 }}
        run: |
          set -euo pipefail
          cat > homebrew-tap/Formula/die.rb <<FORMULA
          class Die < Formula
            desc "Tiny CLI: print ARGS (or stdin) to stderr and exit 1"
            homepage "https://github.com/kawaz/die"
            version "${VERSION}"
            license "MIT"

            on_macos do
              on_arm do
                url "https://github.com/kawaz/die/releases/download/v#{version}/die-darwin-arm64"
                sha256 "${DARWIN_ARM64}"
              end
              on_intel do
                url "https://github.com/kawaz/die/releases/download/v#{version}/die-darwin-amd64"
                sha256 "${DARWIN_AMD64}"
              end
            end

            on_linux do
              on_arm do
                url "https://github.com/kawaz/die/releases/download/v#{version}/die-linux-arm64"
                sha256 "${LINUX_ARM64}"
              end
              on_intel do
                url "https://github.com/kawaz/die/releases/download/v#{version}/die-linux-amd64"
                sha256 "${LINUX_AMD64}"
              end
            end

            def install
              bin.install Dir["die-*"].first => "die"
            end

            test do
              # die -- "msg" must write "msg\\n" to stderr and exit 1.
              output = pipe_output("#{bin}/die -- testmsg 2>&1", nil, 1)
              assert_match "testmsg", output
            end
          end
          FORMULA
      - name: Commit and push formula
        env:
          VERSION: ${{ needs.check-version.outputs.version }}
        run: |
          set -euo pipefail
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Stage first, then check whether the index has changes.
          # `git diff --quiet -- Formula/die.rb` ignores untracked files,
          # so on the very first release the formula would be silently
          # skipped. `git diff --cached --quiet` after `git add` correctly
          # covers both new and modified cases.
          git add Formula/die.rb
          if ! git diff --cached --quiet -- Formula/die.rb; then
            git commit -m "Update die to ${VERSION}"
            git push
          else
            echo "Formula unchanged; nothing to commit."
          fi
