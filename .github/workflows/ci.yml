name: ci

# Post-DR-0007 (Zig adoption) CI:
#   - lint: zig fmt + just self-fmt + shellcheck
#   - unit tests: zig build test (test blocks in src/main.zig)
#   - build: ReleaseSmall → bin/die, uploaded as artifact
#   - e2e: tests/run.sh against the built binary
#
# Matrix: 3 OSes (ubuntu / macos / windows). Windows runs use bash via
# Git for Windows (shell: bash).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  zig:
    name: zig (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Disable CRLF rewriting on Windows
        if: runner.os == 'Windows'
        run: git config --global core.autocrlf false
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          # Pin explicitly so setup-zig doesn't probe for build.zig.zon in
          # the working directory and so stable-zig bumps surface as
          # deliberate version-pin changes in CI.
          version: 0.16.0
      - name: zig fmt check
        run: zig fmt --check build.zig src/
      - name: unit tests
        run: zig build test --summary all
      - name: build (ReleaseSmall)
        run: |
          zig build -Doptimize=ReleaseSmall
          mkdir -p bin
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp zig-out/bin/die.exe bin/die.exe
            ls -lh bin/die.exe
          else
            cp zig-out/bin/die bin/die
            ls -lh bin/die
          fi
      - name: e2e tests
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            DIE_BIN="$PWD/bin/die.exe" bash tests/run.sh
          else
            DIE_BIN="$PWD/bin/die" bash tests/run.sh
          fi
      - name: upload binary
        uses: actions/upload-artifact@v4
        with:
          name: die-${{ matrix.os }}
          path: bin/die*
          if-no-files-found: error
          retention-days: 7
